# Stub mode with real PostgreSQL
# Use: docker compose -f docker-compose.stub.yml up -d postgres
# Then: ./run-stub-mode.sh --with-db
# Or run both: docker compose -f docker-compose.stub.yml up
#
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: viirtuoz-stub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: viirtuoz
      POSTGRES_PASSWORD: stub
      POSTGRES_DB: viirtuoz
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - viirtuoz_stub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viirtuoz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  viirtuoz_stub_pgdata:
