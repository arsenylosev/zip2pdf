#cloud-config
hostname: {hostname}
manage_etc_hosts: true
preserve_hostname: false
ssh_pwauth: {ssh_pwauth}

{write_files_section}

# Выполняется ДО установки пакетов
bootcmd:
  - mkdir -p /etc/systemd/resolved.conf.d
  - |
    cat >/etc/systemd/resolved.conf.d/custom-dns.conf << 'EOF'
    [Resolve]
    DNS=8.8.8.8 1.1.1.1
    FallbackDNS=1.0.0.1
    Domains=~.
    DNSSEC=no
    EOF
  - systemctl restart systemd-resolved || true
  - sleep 3
  - |
    for i in 1 2 3 4 5; do
      if getent hosts download.opensuse.org >/dev/null 2>&1; then
        echo "DNS OK"
        break
      fi
      echo "DNS not ready yet, retry..."
      sleep 2
    done

users:
  - name: {username}
    groups: wheel
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
{ssh_keys}
{password_config}

{package_update}

packages:
{packages}

runcmd:
{runcmd}
