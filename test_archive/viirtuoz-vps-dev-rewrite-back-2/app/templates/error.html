<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 640px;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 14px;
        padding: 20px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0 0 10px;
        color: #cbd5e1;
      }
      .meta {
        margin-top: 14px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.7);
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      .btn {
        display: inline-block;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: #1d4ed8;
        color: #fff;
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
      }
      .btn.secondary {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>{{ error_title or "Something went wrong" }}</h1>
      <p>{{ error_message or "Please try again later." }}</p>
      <div class="meta">
        <div><strong>Status:</strong> {{ status_code or 500 }}</div>
        <div><strong>Path:</strong> {{ error_path or request.url.path }}</div>
      </div>
      <div class="actions">
        <a class="btn" href="/dashboard">Go to dashboard</a>
        <a class="btn secondary" href="#" onclick="history.back(); return false;">Go back</a>
      </div>
    </main>
  </body>
</html>
