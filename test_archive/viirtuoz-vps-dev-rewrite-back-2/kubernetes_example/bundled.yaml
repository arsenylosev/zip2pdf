apiVersion: v1
kind: Namespace
metadata:
  name: kvm
  labels:
    name: kvm
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: kubevirt-manager-priority
value: 1000000
globalDefault: false
description: Priority class for kubevirt-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevirt-api-manager-multus
  namespace: kvm
---
# ClusterRole for minimal cluster-wide permissions (only nodes and GPU discovery)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubevirt-api-manager-cluster-role-multus
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# ClusterRoleBinding for minimal cluster-wide access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevirt-api-manager-cluster-binding-multus
subjects:
  - kind: ServiceAccount
    name: kubevirt-api-manager-multus
    namespace: kvm
roleRef:
  kind: ClusterRole
  name: kubevirt-api-manager-cluster-role-multus
  apiGroup: rbac.authorization.k8s.io
---
# Role for namespace-specific permissions (kv-* namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubevirt-api-manager-user-ns-role-multus
rules:
  - apiGroups: ["kubevirt.io"]
    resources:
      - virtualmachines
      - virtualmachineinstances
      - virtualmachineinstancepresets
      - virtualmachineinstancereplicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources:
      ["virtualmachineinstances/vnc", "virtualmachineinstances/console"]
    verbs: ["get"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources:
      ["virtualmachines/start", "virtualmachines/stop", "virtualmachines/restart"]
    verbs: ["update"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      ["pods", "endpoints", "persistentvolumeclaims", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["crd.projectcalico.org"]
    resources: ["ippools"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["crd.projectcalico.org"]
    resources: ["globalnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# ClusterRoleBinding for user namespace access (kv-* pattern)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevirt-api-manager-user-ns-binding-multus
subjects:
  - kind: ServiceAccount
    name: kubevirt-api-manager-multus
    namespace: kvm
roleRef:
  kind: ClusterRole
  name: kubevirt-api-manager-user-ns-role-multus
  apiGroup: rbac.authorization.k8s.io
---
# Role for Windows DataVolume cloning (required for Windows Golden Image / ISO)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: windows-iso-cloner
  namespace: kvm
rules:
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes/source"]
    verbs: ["create"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get"]
    resourceNames: ["windows-10-iso", "windows-10-golden-image"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
    resourceNames: ["windows-10-iso", "windows-10-golden-image"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: windows-iso-cloner-binding
  namespace: kvm
subjects:
  - kind: Group
    name: system:serviceaccounts
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: windows-iso-cloner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: juniper-sidecar-code
  namespace: kvm
data:
  juniper_sidecar.py: |
    import logging
    import subprocess
    import os
    from flask import Flask, request, jsonify

    MAX_LEN = 31
    SSH_CONTROL = "/tmp/juniper-ssh-%r@%h:%p"

    def _juniper_name(vm_name, namespace, service_name, port):
        ns = (namespace or "").replace("kv-", "").replace("-", "")[:6] or "x"
        vm = (vm_name or "x")[:8]
        svc = (service_name or "x")[:4]
        name = f"kv_{vm}_{ns}_{svc}_{port}"
        return name[:MAX_LEN] if len(name) > MAX_LEN else name

    # Configure logging
    logging.basicConfig(
        level=logging.DEBUG,
        format='%(asctime)s [%(levelname)s] %(name)s: %(message)s'
    )
    logger = logging.getLogger("juniper-sidecar")

    app = Flask(__name__)

    # Configuration (set via env in StatefulSet; defaults are placeholders)
    JUNIPER_HOST = os.getenv('JUNIPER_HOST', 'CHANGE-ME')
    JUNIPER_USER = os.getenv('JUNIPER_USER', 'CHANGE-ME')
    JUNIPER_EXTERNAL_IP = os.getenv('JUNIPER_EXTERNAL_IP', 'CHANGE-ME')
    SSH_KEY_PATH = "/root/.ssh/id_rsa"

    def execute_ssh_command(commands):
        """Execute commands on Juniper via SSH"""
        cmd_string = "; ".join(commands)
        full_cmd_string = f"edit; {cmd_string}; show | compare; commit; quit"
        
        ssh_command = [
            "ssh",
            "-i", SSH_KEY_PATH,
            "-o", "StrictHostKeyChecking=no",
            "-o", "UserKnownHostsFile=/dev/null",
            "-o", "PubkeyAcceptedAlgorithms=+ssh-rsa",
            "-o", "HostKeyAlgorithms=+ssh-rsa",
            "-o", "ControlMaster=auto",
            "-o", f"ControlPath={SSH_CONTROL}",
            "-o", "ControlPersist=60",
            f"{JUNIPER_USER}@{JUNIPER_HOST}",
            full_cmd_string
        ]
        
        logger.info(f"Connecting to {JUNIPER_USER}@{JUNIPER_HOST}...")
        logger.info(f"Commands to execute:\n{full_cmd_string}")
        
        try:
            # Debug: Check key permissions before running
            subprocess.run(["ls", "-l", SSH_KEY_PATH], check=False)
            
            result = subprocess.run(
                ssh_command,
                capture_output=True,
                text=True,
                timeout=45
            )
            
            if result.returncode != 0:
                logger.error("---------------- JUNIPER SSH ERROR ----------------")
                logger.error(f"Return Code: {result.returncode}")
                logger.error(f"STDERR:\n{result.stderr}")
                logger.error(f"STDOUT:\n{result.stdout}")
                logger.error("---------------------------------------------------")
                return False, result.stderr
                
            logger.info("---------------- JUNIPER SUCCESS ----------------")
            logger.info(f"STDOUT:\n{result.stdout}")
            logger.info("-------------------------------------------------")
            return True, result.stdout
            
        except Exception as e:
            logger.exception("Exception during SSH execution")
            return False, str(e)

    @app.route('/health', methods=['GET'])
    def health():
        return jsonify({"status": "ok"}), 200

    @app.route('/add_rule', methods=['POST'])
    def add_rule():
        data = request.json
        vm_name = data.get('vm_name')
        dest_ip = data.get('dest_ip')
        port = data.get('port')
        service_name = data.get('service_name', 'unknown')
        namespace = data.get('namespace', 'unknown')
        external_ip = data.get('external_ip') or JUNIPER_EXTERNAL_IP

        if not all([vm_name, dest_ip, port]):
            return jsonify({"error": "Missing required fields"}), 400

        common_name = _juniper_name(vm_name, namespace, service_name, port)

        dst_nat_pool_name = common_name
        rule_name = common_name
        policy_name = common_name
        app_name = common_name

        commands = [
            f"set security nat destination pool {dst_nat_pool_name} address {dest_ip}/32 port {port}",
            f"set security nat destination rule-set dst-nat rule {rule_name} match destination-address {external_ip}/32",
            f"set security nat destination rule-set dst-nat rule {rule_name} match destination-port {port}",
            f"set security nat destination rule-set dst-nat rule {rule_name} then destination-nat pool {dst_nat_pool_name}",
            f"set security zones security-zone trust address-book address {common_name} {dest_ip}/32",
            f"set applications application {app_name} protocol tcp destination-port {port}",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} match source-address any",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} match destination-address {common_name}",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} match application {app_name}",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} then permit"
        ]
        
        success, msg = execute_ssh_command(commands)
        if success:
            return jsonify({"status": "success", "output": msg}), 200
        else:
            return jsonify({"status": "error", "error": msg}), 500

    @app.route('/delete_rule', methods=['POST'])
    def delete_rule():
        data = request.json
        vm_name = data.get('vm_name')
        port = data.get('port')
        service_name = data.get('service_name', 'unknown')
        namespace = data.get('namespace', 'unknown')
        
        if not all([vm_name, port]):
            return jsonify({"error": "Missing required fields"}), 400

        common_name = _juniper_name(vm_name, namespace, service_name, port)
        
        commands = [
            f"delete security nat destination pool {common_name}",
            f"delete security nat destination rule-set dst-nat rule {common_name}",
            f"delete security zones security-zone trust address-book address {common_name}",
            f"delete applications application {common_name}",
            f"delete security policies from-zone untrust to-zone trust policy {common_name}"
        ]
        
        success, msg = execute_ssh_command(commands)
        # Success even if it fails because it might not exist
        return jsonify({"status": "success", "output": msg}), 200

    if __name__ == '__main__':
        print("Starting Juniper Sidecar on 5001...")
        app.run(host='0.0.0.0', port=5001)
---
apiVersion: v1
kind: Service
metadata:
  name: kubevirt-api-manager
  namespace: kvm
  labels:
    app: kubevirt-api-manager
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30180
  selector:
    app: kubevirt-api-manager
---
# Login path - NO Basic Auth (so session-expired redirect works)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubevirt-manager-ingress-login
  namespace: kvm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - CHANGE-ME.example.com
      secretName: kubevirt-manager-tls
  rules:
    - host: CHANGE-ME.example.com
      http:
        paths:
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: kubevirt-api-manager
                port:
                  number: 80
---
# All other paths - WITH Basic Auth
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubevirt-manager-ingress
  namespace: kvm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: "CHANGE-ME.example.com"
    external-dns.alpha.kubernetes.io/target: "CHANGE-ME"
    external-dns.alpha.kubernetes.io/ttl: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/auth-realm: "Enter your credentials"
    nginx.ingress.kubernetes.io/auth-secret: "htpasswd"
    nginx.ingress.kubernetes.io/auth-type: "basic"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - CHANGE-ME.example.com
      secretName: kubevirt-manager-tls
  rules:
    - host: CHANGE-ME.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubevirt-api-manager
                port:
                  number: 80
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubevirt-manager-monitor
  namespace: kvm
  labels:
    app: kubevirt-api-manager
spec:
  selector:
    matchLabels:
      app: kubevirt-api-manager
  endpoints:
    - port: http
      interval: 30s
  namespaceSelector:
    matchNames:
      - kvm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevirt-api-manager
  namespace: kvm
  labels:
    app: kubevirt-api-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubevirt-api-manager
  template:
    metadata:
      labels:
        app: kubevirt-api-manager
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                  - key: node-role.kubernetes.io/gpu-worker
                    operator: DoesNotExist
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
                  - key: node-role.kubernetes.io/gpu-worker
                    operator: DoesNotExist
              - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
                  - key: node-role.kubernetes.io/gpu-worker
                    operator: DoesNotExist
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: cephfs
          operator: Exists
          effect: NoSchedule
        - key: data
          operator: Exists
          effect: NoSchedule
      serviceAccountName: kubevirt-api-manager-multus
      hostAliases:
        - ip: "CHANGE-ME"
          hostnames:
            - "llm.CHANGE-ME"
      containers:
        - name: manager
          image: your-registry.example.com/kubevirt/kv_api_manager:1.0-rc.0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DEBUG
              value: "false"
            - name: LOG_LEVEL
              value: "info"
            - name: JUNIPER_USER
              value: "CHANGE-ME"
            - name: JUNIPER_HOST
              value: "CHANGE-ME"
            - name: JUNIPER_EXTERNAL_IP
              value: "CHANGE-ME"
            - name: STORAGE_CLASS_NAME
              value: "your-SC"
            # VM_STORAGE_NODE_SELECTOR: JSON nodeSelector so VMs run only on nodes with CSI (e.g. Ceph RBD). Example: '{"csi-rbd":"ceph"}'
            - name: VM_STORAGE_NODE_SELECTOR
              value: ""
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kubevirt-api-secrets
                  key: secret-key
                  optional: true
            - name: DEMO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kubevirt-api-secrets
                  key: demo-username
                  optional: true
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubevirt-api-secrets
                  key: demo-password
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "1000m"
              memory: "1024Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: juniper-ssh-key
              mountPath: /etc/juniper-secret
              readOnly: true
            - name: log-volume
              mountPath: /app/logs
        - name: juniper-sidecar
          image: your-registry.example.com/kubevirt/kv_api_manager:1.0-rc.0.0.1
          command: ["/bin/bash", "-c"]
          args:
            - |
              mkdir -p /root/.ssh
              cp /etc/juniper-secret/id_rsa /root/.ssh/id_rsa
              chmod 600 /root/.ssh/id_rsa
              echo "Starting Sidecar..."
              python /app/sidecar/juniper_sidecar.py
          env:
            - name: JUNIPER_USER
              value: "CHANGE-ME"
            - name: JUNIPER_HOST
              value: "CHANGE-ME"
            - name: JUNIPER_EXTERNAL_IP
              value: "CHANGE-ME"
          volumeMounts:
            - name: juniper-sidecar-code
              mountPath: /app/sidecar
            - name: juniper-ssh-key
              mountPath: /etc/juniper-secret
              readOnly: true
            - name: log-volume
              mountPath: /app/logs
        - name: dnat-logs
          image: busybox
          args:
            [
              /bin/sh,
              -c,
              "mkdir -p /app/logs && touch /app/logs/dnat.log && tail -f /app/logs/dnat.log",
            ]
          volumeMounts:
            - name: log-volume
              mountPath: /app/logs
      volumes:
        - name: juniper-sidecar-code
          configMap:
            name: juniper-sidecar-code
        - name: log-volume
          emptyDir: {}
        - name: juniper-ssh-key
          secret:
            secretName: juniper-ssh-key
            defaultMode: 0400
---
apiVersion: crd.projectcalico.org/v1
kind: GlobalNetworkPolicy
metadata:
  name: vm-deny-internal-networks
  labels:
    app: kubevirt-api-manager
    policy-type: vm-network-restriction
spec:
  # Select VM pods only (pods with kubevirt.io/domain label)
  selector: has(kubevirt.io/domain)

  # Lower order = higher priority
  order: 1000

  types:
    - Ingress
    - Egress

  ingress:
    # Allow all incoming traffic to VMs
    - action: Allow

  egress:
    # Deny egress to Pod network (default: 10.244.0.0/16)
    # Update POD_NETWORK_CIDR in config.py if your pod network is different
    - action: Deny
      destination:
        nets:
          - "192.168.192.0/18" # Pod network CIDR

    # Deny egress to Service network (default: 10.96.0.0/12)
    # Update SERVICE_NETWORK_CIDR in config.py if your service network is different
    - action: Deny
      destination:
        nets:
          - "10.96.0.0/18" # Service network CIDR

    # Deny egress to server networks
    # Update SERVER_NETWORK_CIDRS in config.py with your server network CIDRs
    - action: Deny
      destination:
        nets:
          - "CHANGE-ME" # Example server network CIDR

    # Allow all other egress traffic
    - action: Allow
