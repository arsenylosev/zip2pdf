# Example secrets file for kubevirt-api-manager
# DO NOT commit this file with real credentials!
# All sensitive data: set via env vars or Kubernetes Secrets.
# See app/config.py for full list of configurable variables.
#
# kubectl create secret generic kubevirt-api-secrets \
#   --from-literal=secret-key='your-random-secret-key' \
#   --from-literal=demo-username='admin' \
#   --from-literal=demo-password='secure-password' \
#   --from-literal=llm-api-key='sk-...' \
#   -n kvm

apiVersion: v1
kind: Secret
metadata:
  name: kubevirt-api-secrets
  namespace: kvm
type: Opaque
stringData:
  secret-key: "CHANGE-ME-random-secret-key-at-least-32-characters-long"
  demo-username: "admin"
  demo-password: "CHANGE-ME-secure-password"
