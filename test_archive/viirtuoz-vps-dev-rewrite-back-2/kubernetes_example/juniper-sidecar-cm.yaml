apiVersion: v1
kind: ConfigMap
metadata:
  name: juniper-sidecar-code
  namespace: kvm
data:
  juniper_sidecar.py: |
    import logging
    import subprocess
    import os
    from flask import Flask, request, jsonify

    MAX_LEN = 31  # Juniper identifier limit
    SSH_CONTROL = "/tmp/juniper-ssh-%r@%h:%p"  # Connection multiplexing

    def _juniper_name(vm_name, namespace, service_name, port):
        """Short readable name: kv_{vm8}_{ns6}_{svc}_{port}."""
        ns = (namespace or "").replace("kv-", "").replace("-", "")[:6] or "x"
        vm = (vm_name or "x")[:8]
        svc = (service_name or "x")[:4]
        name = f"kv_{vm}_{ns}_{svc}_{port}"
        return name[:MAX_LEN] if len(name) > MAX_LEN else name

    # Configure logging
    logging.basicConfig(
        level=logging.DEBUG,
        format='%(asctime)s [%(levelname)s] %(name)s: %(message)s'
    )
    logger = logging.getLogger("juniper-sidecar")

    app = Flask(__name__)

    # Configuration (set via env in StatefulSet; defaults are placeholders)
    JUNIPER_HOST = os.getenv('JUNIPER_HOST', 'CHANGE-ME')
    JUNIPER_USER = os.getenv('JUNIPER_USER', 'CHANGE-ME')
    JUNIPER_EXTERNAL_IP = os.getenv('JUNIPER_EXTERNAL_IP', 'CHANGE-ME')
    SSH_KEY_PATH = "/root/.ssh/id_rsa"

    def execute_ssh_command(commands):
        """Execute commands on Juniper via SSH"""
        cmd_string = "; ".join(commands)
        full_cmd_string = f"edit; {cmd_string}; show | compare; commit; quit"
        
        ssh_command = [
            "ssh",
            "-i", SSH_KEY_PATH,
            "-o", "StrictHostKeyChecking=no",
            "-o", "UserKnownHostsFile=/dev/null",
            "-o", "PubkeyAcceptedAlgorithms=+ssh-rsa",
            "-o", "HostKeyAlgorithms=+ssh-rsa",
            "-o", "ControlMaster=auto",
            "-o", f"ControlPath={SSH_CONTROL}",
            "-o", "ControlPersist=60",
            f"{JUNIPER_USER}@{JUNIPER_HOST}",
            full_cmd_string
        ]
        
        logger.info(f"Connecting to {JUNIPER_USER}@{JUNIPER_HOST}...")
        logger.info(f"Commands to execute:\n{full_cmd_string}")
        
        try:
            # Debug: Check key permissions before running
            subprocess.run(["ls", "-l", SSH_KEY_PATH], check=False)
            
            result = subprocess.run(
                ssh_command,
                capture_output=True,
                text=True,
                timeout=45
            )
            
            if result.returncode != 0:
                logger.error("---------------- JUNIPER SSH ERROR ----------------")
                logger.error(f"Return Code: {result.returncode}")
                logger.error(f"STDERR:\n{result.stderr}")
                logger.error(f"STDOUT:\n{result.stdout}")
                logger.error("---------------------------------------------------")
                return False, result.stderr
                
            logger.info("---------------- JUNIPER SUCCESS ----------------")
            logger.info(f"STDOUT:\n{result.stdout}")
            logger.info("-------------------------------------------------")
            return True, result.stdout
            
        except Exception as e:
            logger.exception("Exception during SSH execution")
            return False, str(e)

    @app.route('/health', methods=['GET'])
    def health():
        return jsonify({"status": "ok"}), 200

    @app.route('/add_rule', methods=['POST'])
    def add_rule():
        data = request.json
        vm_name = data.get('vm_name')
        dest_ip = data.get('dest_ip')
        port = data.get('port')
        service_name = data.get('service_name', 'unknown')
        namespace = data.get('namespace', 'unknown')
        external_ip = data.get('external_ip') or JUNIPER_EXTERNAL_IP

        if not all([vm_name, dest_ip, port]):
            return jsonify({"error": "Missing required fields"}), 400

        # Juniper limit 31 chars; use readable name or hash
        common_name = _juniper_name(vm_name, namespace, service_name, port)

        dst_nat_pool_name = common_name
        rule_name = common_name
        policy_name = common_name
        app_name = common_name

        commands = [
            f"set security nat destination pool {dst_nat_pool_name} address {dest_ip}/32 port {port}",
            f"set security nat destination rule-set dst-nat rule {rule_name} match destination-address {external_ip}/32",
            f"set security nat destination rule-set dst-nat rule {rule_name} match destination-port {port}",
            f"set security nat destination rule-set dst-nat rule {rule_name} then destination-nat pool {dst_nat_pool_name}",
            f"set security zones security-zone trust address-book address {common_name} {dest_ip}/32",
            f"set applications application {app_name} protocol tcp destination-port {port}",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} match source-address any",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} match destination-address {common_name}",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} match application {app_name}",
            f"set security policies from-zone untrust to-zone trust policy {policy_name} then permit"
        ]
        
        success, msg = execute_ssh_command(commands)
        if success:
            return jsonify({"status": "success", "output": msg}), 200
        else:
            return jsonify({"status": "error", "error": msg}), 500

    @app.route('/delete_rule', methods=['POST'])
    def delete_rule():
        data = request.json
        vm_name = data.get('vm_name')
        port = data.get('port')
        service_name = data.get('service_name', 'unknown')
        namespace = data.get('namespace', 'unknown')
        
        if not all([vm_name, port]):
            return jsonify({"error": "Missing required fields"}), 400

        # Same hash as add_rule
        common_name = _juniper_name(vm_name, namespace, service_name, port)
        
        commands = [
            f"delete security nat destination pool {common_name}",
            f"delete security nat destination rule-set dst-nat rule {common_name}",
            f"delete security zones security-zone trust address-book address {common_name}",
            f"delete applications application {common_name}",
            f"delete security policies from-zone untrust to-zone trust policy {common_name}"
        ]
        
        success, msg = execute_ssh_command(commands)
        # Success even if it fails because it might not exist
        return jsonify({"status": "success", "output": msg}), 200

    if __name__ == '__main__':
        print("Starting Juniper Sidecar on 5001...")
        app.run(host='0.0.0.0', port=5001)
