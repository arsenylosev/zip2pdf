# PVC for custom NVIDIA driver installer (.run or install.sh).
# Used as source for CDI clone when creating VMs with RTX Pro 6000 / custom driver GPU.
# Fill the PVC using the upload pod (nvidia-custom-driver-upload-pod.yaml) and kubectl cp.
# See docs/NVIDIA-CUSTOM-DRIVER.md.
#
# IMPORTANT: Deleting this PVC will permanently remove the driver image. Deleting the
# upload pod does NOT delete this PVC — data remains. To prevent accidental PVC deletion,
# use RBAC or avoid granting delete on this PVC to non-admins.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rtx-pro-6000
  namespace: <namespace>
  labels:
    app.kubernetes.io/component: nvidia-custom-driver-source
  annotations:
    description: "Source for NVIDIA custom driver; do not delete unless replacing driver"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: <storege class>   # change to your cluster's storage class
