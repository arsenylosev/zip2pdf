apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: windows-10-iso
  namespace: kvm  # Match WINDOWS_ISO_NAMESPACE from config
spec:
  source:
    # SECURITY: Do NOT commit presigned URLs with credentials. Use one of:
    # - upload: {} then virtctl image-upload
    # - http: { url: "YOUR_ISO_URL" } (set via env/kustomize)
    upload: {}
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 7Gi
    storageClassName: your-SC
