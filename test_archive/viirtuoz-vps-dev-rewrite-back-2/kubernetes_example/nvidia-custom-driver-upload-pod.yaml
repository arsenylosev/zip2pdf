# One-off pod to copy the NVIDIA driver .run file into the PVC.
# 1. Apply the PVC first: kubectl apply -f nvidia-custom-driver-pvc.yaml
# 2. Apply this pod: kubectl apply -f nvidia-custom-driver-upload-pod.yaml
# 3. Wait: kubectl wait --for=condition=Ready pod/nvidia-driver-upload -n kvm --timeout=120s
# 4. Copy file to /data/ (PVC is mounted there; :/ would copy into container root, not the volume):
#    kubectl cp ./NVIDIA-Linux-x86_64-580.126.09-grid.run <namespace>/nvidia-driver-upload:/data/
#    or one .iso: kubectl cp ./NVidia-trx-6000-guest-driver.iso <namespace>/nvidia-driver-upload:/data/driver.iso
# 5. Delete pod: kubectl delete pod nvidia-driver-upload -n <namespace>
#
# claimName must match NVIDIA_CUSTOM_DRIVER_PVC_NAME in app config (default rtx-pro-6000).
# See docs/NVIDIA-CUSTOM-DRIVER.md.
apiVersion: v1
kind: Pod
metadata:
  name: nvidia-driver-upload
  namespace: <namespace>
spec:
  restartPolicy: Never
  containers:
    - name: upload
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: driver-data
          mountPath: /data
  volumes:
    - name: driver-data
      persistentVolumeClaim:
        claimName: rtx-pro-6000   # must match NVIDIA_CUSTOM_DRIVER_PVC_NAME
