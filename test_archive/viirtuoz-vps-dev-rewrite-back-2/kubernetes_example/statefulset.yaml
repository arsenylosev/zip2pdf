apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kubevirt-api-manager
  namespace: kvm
  labels:
    app: kubevirt-api-manager
spec:
  serviceName: kubevirt-api-manager
  replicas: 1
  selector:
    matchLabels:
      app: kubevirt-api-manager
  template:
    metadata:
      labels:
        app: kubevirt-api-manager
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
              - key: node-role.kubernetes.io/gpu-worker
                operator: DoesNotExist
            - matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: Exists
              - key: node-role.kubernetes.io/gpu-worker
                operator: DoesNotExist
            - matchExpressions:
              - key: node-role.kubernetes.io/worker
                operator: Exists
              - key: node-role.kubernetes.io/gpu-worker
                operator: DoesNotExist
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: cephfs
        operator: Exists
        effect: NoSchedule
      - key: data
        operator: Exists
        effect: NoSchedule
      serviceAccountName: kubevirt-api-manager-multus
      hostAliases:
        - ip: "CHANGE-ME"
          hostnames:
            - "llm.CHANGE-ME"
      containers:
        - name: manager
          image: your-registry.example.com/kubevirt/kv_api_manager:1.0-rc.0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DEBUG
              value: "false"
            - name: LOG_LEVEL
              value: "info"
            - name: JUNIPER_USER
              value: "CHANGE-ME"
            - name: JUNIPER_HOST
              value: "CHANGE-ME"
            - name: STORAGE_CLASS_NAME
              value: "your-SC"
            - name: VM_STORAGE_NODE_SELECTOR
              value: ""
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kubevirt-api-secrets
                  key: secret-key
                  optional: true
            - name: DEMO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kubevirt-api-secrets
                  key: demo-username
                  optional: true
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubevirt-api-secrets
                  key: demo-password
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "1000m"
              memory: "1024Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: juniper-ssh-key
              mountPath: /etc/juniper-secret
              readOnly: true
            - name: log-volume
              mountPath: /app/logs
        - name: juniper-sidecar
          image: your-registry.example.com/kubevirt/kv_api_manager:1.0-rc.0.0.1
          command: ["/bin/bash", "-c"]
          args:
            - |
              mkdir -p /root/.ssh
              cp /etc/juniper-secret/id_rsa /root/.ssh/id_rsa
              chmod 600 /root/.ssh/id_rsa
              echo "Starting Sidecar..."
              python /app/sidecar/juniper_sidecar.py
          env:
            - name: JUNIPER_USER
              value: "CHANGE-ME"
            - name: JUNIPER_HOST
              value: "CHANGE-ME"
            - name: JUNIPER_EXTERNAL_IP
              value: "CHANGE-ME"
          volumeMounts:
            - name: juniper-sidecar-code
              mountPath: /app/sidecar
            - name: juniper-ssh-key
              mountPath: /etc/juniper-secret
              readOnly: true
            - name: log-volume
              mountPath: /app/logs
        - name: dnat-logs
          image: busybox
          args: [/bin/sh, -c, 'mkdir -p /app/logs && touch /app/logs/dnat.log && tail -f /app/logs/dnat.log']
          volumeMounts:
            - name: log-volume
              mountPath: /app/logs
      volumes:
        - name: juniper-sidecar-code
          configMap:
            name: juniper-sidecar-code
        - name: log-volume
          emptyDir: {}
        - name: juniper-ssh-key
          secret:
            secretName: juniper-ssh-key
            defaultMode: 0400
